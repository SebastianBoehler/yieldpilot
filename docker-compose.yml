services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: yieldpilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "bun run db:push && bun run start"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/yieldpilot?schema=public
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "bun run db:push && bun run worker"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/yieldpilot?schema=public
    depends_on:
      - postgres

volumes:
  postgres-data:
