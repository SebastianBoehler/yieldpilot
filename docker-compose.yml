services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npm run db:push && npm run start"
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/data/dev.db
    ports:
      - "3000:3000"
    volumes:
      - yieldpilot-data:/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npm run db:push && npm run worker"
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/data/dev.db
    depends_on:
      - app
    volumes:
      - yieldpilot-data:/data

volumes:
  yieldpilot-data:
